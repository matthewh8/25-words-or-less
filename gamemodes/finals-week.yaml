id: finals-week
name: Finals Week
shortName: FINALS
description: Harder stacks, pressure bonuses, and final-exam pacing.
roundCount: 4

timing:
  turnSeconds: 40
  moneySeconds: 55
  biddingSeconds: 60
  minSeconds: 10
  maxSeconds: 240
  turnPresets: [30, 40, 50, 60]
  moneyPresets: [45, 55, 70, 90]

bidding:
  title: Study Bid
  contests: 2
  wordDeck: bidding
  wordCount: 5
  minBid: 6
  maxBid: 22
  successPoints: 10
  failurePoints: 5
  failureAward: opponent

stacks:
  title: Exam Stacks
  wordCount: 5
  wordLimit: 18
  allCorrectBonus: 7
  rounds:
    - number: 2
      turns: 3
      startTeam: 0
    - number: 3
      turns: 3
      startTeam: 1
  options:
    - id: yellow
      label: Yellow
      wordDeck: yellow
      pointsPerWord: 2
      color: "#ffd23f"
    - id: red
      label: Red
      wordDeck: red
      pointsPerWord: 4
      color: "#ff3a6d"
    - id: green
      label: Green
      wordDeck: green
      pointsPerWord: 1
      color: "#2de584"

money:
  title: Final Exam
  wordDeck: money
  wordCount: 10
  wordLimit: 22
  jackpotPoints: 30

clueActions:
  allowSkip: true
  allowBudgetRefund: true
  autoAdvanceOnCorrect: true

challenge:
  enabledByDefault: true
  includeAlcoholByDefault: false
  maxPerGame: 5
  frequency: normal
  prompts:
    perfect:
      - "A-plus round: opponents give a standing desk ovation."
    manySkips:
      - "Office hours: cluing team says what they should have studied."

accessibility:
  speechRecognitionDefault: false
  announceControls: true
