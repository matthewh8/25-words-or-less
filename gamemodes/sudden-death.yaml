id: sudden-death
name: Sudden Death
shortName: DEATH
description: Short rounds and high-pressure scoring for a quick elimination feel.
roundCount: 3

timing:
  turnSeconds: 25
  moneySeconds: 40
  biddingSeconds: 40
  minSeconds: 10
  maxSeconds: 180
  turnPresets: [20, 25, 30, 45]
  moneyPresets: [30, 40, 50, 60]

bidding:
  title: Death Bid
  contests: 1
  wordDeck: bidding
  wordCount: 5
  minBid: 5
  maxBid: 16
  successPoints: 12
  failurePoints: 8
  failureAward: opponent

stacks:
  title: Death Stacks
  wordCount: 5
  wordLimit: 12
  allCorrectBonus: 8
  rounds:
    - number: 2
      turns: 3
      startTeam: 0
  options:
    - id: green
      label: Green
      wordDeck: green
      pointsPerWord: 1
      color: "#2de584"
    - id: yellow
      label: Yellow
      wordDeck: yellow
      pointsPerWord: 3
      color: "#ffd23f"
    - id: red
      label: Red
      wordDeck: red
      pointsPerWord: 5
      color: "#ff3a6d"

money:
  title: Last Word
  wordDeck: money
  wordCount: 7
  wordLimit: 15
  jackpotPoints: 25

clueActions:
  allowSkip: true
  allowBudgetRefund: false
  autoAdvanceOnCorrect: true

challenge:
  enabledByDefault: true
  includeAlcoholByDefault: false
  maxPerGame: 3
  frequency: normal
  prompts:
    closeFailure:
      - "Sudden miss: opponents pick the word that ended the run."

accessibility:
  speechRecognitionDefault: false
  announceControls: true
