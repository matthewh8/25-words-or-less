id: word-nerd
name: Word Nerd
shortName: NERD
description: Harder vocabulary, tighter clue budgets, and bigger all-correct bonuses.
roundCount: 4

timing:
  turnSeconds: 50
  moneySeconds: 70
  biddingSeconds: 80
  premeditationSeconds: 30
  minSeconds: 15
  maxSeconds: 300
  turnPresets: [40, 50, 60, 75]
  moneyPresets: [55, 70, 90, 120]

bidding:
  title: Nerd Bid
  contests: 2
  wordDeck: yellow
  wordCount: 5
  minBid: 5
  maxBid: 22
  successPoints: 12
  failurePoints: 5
  failureAward: opponent

stacks:
  title: Nerd Stacks
  wordCount: 5
  wordLimit: 16
  allCorrectBonus: 8
  rounds:
    - number: 2
      turns: 3
      startTeam: 0
    - number: 3
      turns: 3
      startTeam: 1
  options:
    - id: yellow
      label: Yellow
      wordDeck: yellow
      pointsPerWord: 2
      color: "#ffd23f"
    - id: red
      label: Red
      wordDeck: red
      pointsPerWord: 4
      color: "#ff3a6d"
    - id: green
      label: Green
      wordDeck: green
      pointsPerWord: 1
      color: "#2de584"

money:
  title: Nerd Final
  wordDeck: red
  wordCount: 8
  wordLimit: 20
  jackpotPoints: 30

clueActions:
  allowSkip: true
  allowBudgetRefund: true
  autoAdvanceOnCorrect: true

challenge:
  enabledByDefault: true
  includeAlcoholByDefault: false
  maxPerGame: 4
  frequency: low
  prompts:
    perfect:
      - "Word nerd flex: opponents ask for one clue explanation."
    zeroCorrect:
      - "Dictionary break: cluing team invents a fake definition for one missed word."

accessibility:
  speechRecognitionDefault: false
  announceControls: true
